<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | QR code component</title>

 
  <style>
    body {
      margin: 0;
    }

    .container {

      width: 100%;
      height: 100vh;
      background: #D5E1EF;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      box-sizing: border-box;
      background-color: white;
      flex-basis: 320px;
      padding: 16px 16px 40px 16px;
      margin: 8px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0px 25px 25px rgba(0, 0, 0, 0.477);
    }

    .image {
      display: block;
      width: 288px;
      border-radius: 20px;
    }

    .text h3 {
      margin: 0;
      text-align: center;
      color: #1F314F;
      font-size: 22px;
      line-height: 120%;
      letter-spacing: 0px;
      font-weight: 700;
    }

    .text p {
      margin: 0;
      text-align: center;
      color: #68778D;
      font-size: 15px;
      line-height: 140%;
      letter-spacing: 0.2px;
      font-weight: 400;
    }

    .text {
      font-family: Outfit, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 0px 16px;
    }

    .text .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card"><img class="image" src="./images/image-qr-code.png" alt="QR-code">
      <div class="text">
        <h3>Improve your front-end skills by building projects</h3>
        <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </div>
    </div>

  </div>

</body>

</html>
